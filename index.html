<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva de Salas — Automation Pro Max</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">

  <div class="header">
    <div class="badge">
      <div class="badge-dot"></div>
      Automation Pro Max
    </div>
    <h1>Reserva de <span>salas</span><br> Automation Pro Max</h1>
    
  </div>

  <div class="card">


    <div class="section-label">01 — Datos de la reunión</div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="field">
        <label>Título de la reunión *</label>
        <input type="text" id="titulo" placeholder="ej. Cierre mensual" autocomplete="off">
        <span class="field-error" id="err-titulo">Campo requerido</span>
      </div>
      <div class="field">
        <label>Área / Equipo *</label>
        <input type="text" id="area" placeholder="ej. Contabilidad" autocomplete="off">
        <span class="field-error" id="err-area">Campo requerido</span>
      </div>
    </div>

    <div class="field" style="margin-bottom:16px">
      <label>Organizador *</label>
      <input type="text" id="organizador" placeholder="Nombre completo" autocomplete="off">
      <span class="field-error" id="err-organizador">Campo requerido</span>
    </div>

    <div class="field" style="margin-bottom:0">
      <label>Correo del organizador *</label>
      <input type="email" id="email" placeholder="correo@empresa.com">
      <span class="field-error" id="err-email">Correo inválido</span>
    </div>

    <div class="sep"></div>


    <div class="section-label">02 — Sala y horario</div>

    <div class="grid-2" style="margin-bottom:16px">
      <div class="field">
        <label>Sala *</label>
        <select id="sala_id" onchange="actualizarSala()">
          <option value="">Seleccionar sala…</option>
          <optgroup label="Salas pequeñas (5 personas)">
            <option value="APM5A1">Sala 5 - A1</option>
            <option value="APM5A2">Sala 5 - A2</option>
            <option value="APM5A3">Sala 5 - A3</option>
          </optgroup>
          <optgroup label="Salas medianas (10 personas)">
            <option value="APM10B1">Sala 10 - B1</option>
            <option value="APM10B2">Sala 10 - B2</option>
            <option value="APM10B3">Sala 10 - B3</option>
            <option value="APM10B4">Sala 10 - B4</option>
            <option value="APM10B5">Sala 10 - B5</option>
          </optgroup>
          <optgroup label="Sala grande (25 personas)">
            <option value="APM25C1">Sala 25 - C1</option>
          </optgroup>
          <optgroup label="Auditorio (50 personas)">
            <option value="APM50D1">Auditorio 50 - D1</option>
          </optgroup>
        </select>
        <div class="sala-info" id="sala-info"></div>
        <span class="field-error" id="err-sala_id">Selecciona una sala</span>
      </div>
      <div class="field">
        <label>Número de asistentes *</label>
        <input type="number" id="asistentes" placeholder="ej. 8" min="1" max="50">
        <span class="field-error" id="err-asistentes">Campo requerido</span>
      </div>
    </div>

    <div class="grid-3">
      <div class="field">
        <label>Fecha *</label>
        <input type="date" id="fecha">
        <span class="field-error" id="err-fecha">Selecciona una fecha</span>
      </div>
      <div class="field">
        <label>Hora inicio *</label>
        <input type="time" id="hora_inicio" step="1800">
        <span class="field-error" id="err-hora_inicio">Campo requerido</span>
      </div>
      <div class="field">
        <label>Hora fin *</label>
        <input type="time" id="hora_fin" step="1800">
        <span class="field-error" id="err-hora_fin">Debe ser mayor que inicio</span>
      </div>
    </div>

    <div class="sep"></div>

    <button class="btn-submit" onclick="enviarReserva()">
      <span id="btn-text">Solicitar reserva</span>
      <div class="spinner" id="spinner"></div>
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
